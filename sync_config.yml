# sync_config.yml — cấu hình đồng bộ Polygon → VNOJ
#
# Các giá trị trong `defaults` được áp dụng cho mọi bài nếu bài đó
# không tự override trường đó.

defaults:
  group: "Uncategorized"
  type: "uncategorized"
  languages: [CPP14, CPP17, CPP20, PY3, PYPY3, JAVA]
  partial: false
  public: true

